<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sunday Bazaar Checklist</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <style>
        body {
            padding: 50px;
            text-align: center;
        }
        ul {
            max-width: 400px;
            margin: auto;
        }
    </style>
</head>
<body>

    <h2>🛒 Sunday Bazaar Checklist</h2>

    <!-- Input + Button -->
    <input type="text" id="itemInput" class="form-control my-3" placeholder="Enter item">
    <button id="addBtn" class="btn btn-success mb-3">Add to Bag</button>

    <!-- List -->
    <ul id="list" class="list-group"></ul>

    <script>
        // Add Item
        $("#addBtn").click(function() {
            let item = $("#itemInput").val();

            if (item !== "") {
                $("#list").append(`
                    <li class="list-group-item d-flex justify-content-between align-items-center">
                        ${item}
                        <button class="btn btn-danger btn-sm deleteBtn">Delete</button>
                    </li>
                `);

                // Clear input
                $("#itemInput").val("");
            }
        });

        // Delete Item (IMPORTANT: event delegation)
        $("#list").on("click", ".deleteBtn", function() {
            $(this).parent().remove();
        });
    </script>

</body>
</html>
